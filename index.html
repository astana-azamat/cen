<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#F4F4F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CEN Trainer">
<title>CEN Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#F4F4F2;
--surface:#FFFFFF;
--border:#ECECEA;
--text:#1A1A1A;
--muted:#8B8B85;
--soft:#C8C8C5;
--accent:#C8FF5A;
--accent-dark:#84CC16;
--purple:#7C6AFF;
--orange:#FB923C;
--pink:#EC4899;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;font-weight:400;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;font-weight:500}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:28px 22px 0;background:var(--bg);position:sticky;top:0;z-index:10}
.content{flex:1;padding:0 22px 130px;overflow-y:auto}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--bg);padding:8px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:100}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:6px}
.tab{flex:1;padding:10px 4px;border-radius:20px;background:transparent;color:var(--muted);font-size:10px;font-weight:500;text-align:center;letter-spacing:0.3px}
.tab.active{background:var(--accent);color:var(--text);font-weight:600}
.tab-icon{font-size:14px;margin-bottom:3px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:20px;margin-bottom:14px}
.row{display:flex;align-items:center;gap:12px}
.progress-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;border-radius:6px;background:var(--accent-dark);transition:width 0.5s ease}
.task-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:transform 0.15s ease}
.task-row.done{background:rgba(200,255,90,0.18);border-color:rgba(200,255,90,0.6)}
.task-icon{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:300}
.score-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
.score-btn.selected{background:var(--accent);border-color:var(--accent);color:var(--text);font-weight:600}
.save-btn{width:100%;padding:15px;border-radius:18px;background:var(--accent);border:none;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
.chart-bar{border-radius:6px;background:var(--accent);transition:height 0.6s ease}
</style>
</head>
<body>
<div class="app">
  <div class="header" id="header"></div>
  <div class="content" id="content"></div>
</div>
<div class="bottom-nav"><div class="tabs" id="bottom-nav"></div></div>
<script>
var TASKS=[
  {id:"calibration",label:"Калибровка",dur:3,icon:"▲",tag:"Гашение DMN",color:"#84CC16",
   why:"Поставил чайник — пока кипит, 1 минута отжиманий и 1 минута приседаний. Резкая физическая нагрузка активирует SN и гасит утреннюю DMN. К моменту когда чайник готов — CEN уже работает."},
  {id:"lying",label:"Лежите без телефона",dur:3,icon:"⌒",tag:"Мягкий запуск",color:"#84CC16",
   why:"Первые минуты после пробуждения мозг ещё в дельта/тета. Не хватать телефон — значит не нагружать SN внешним стимулом. Просто полежать без экрана: дать дефолтной сети плавно перейти в рабочий режим."},
  {id:"meditation",label:"Медитация",dur:9,icon:"◎",tag:"CEN напрямую",color:"#84CC16",
   why:"Каждый раз когда замечаете отвлечение и возвращаетесь -- dlPFC делает повторение. 9 минут — короткий блок без скатывания в расслабление. Силовая тренировка префронтальной коры."},
  {id:"washing",label:"Умывание",dur:15,icon:"◐",tag:"Закрытый цикл",color:"#84CC16",
   why:"Утренний душ/умывание прохладной водой — мягкий стимул для SN. Завершённый цикл: начал — закончил. Ещё одна тренировка CEN на структуре."},
  {id:"breakfast",label:"Завтрак",dur:40,icon:"●",tag:"Глюкоза для dlPFC",color:"#84CC16",
   why:"Готовка + еда без телефона. 40 минут на один процесс. Готовка — десятки маленьких завершённых циклов (взял-нарезал-готово), тренирует CEN на структуре. Сам завтрак даёт глюкозу для dlPFC. Без телефона за столом — внимание остаётся на еде."},
  {id:"writing",label:"Запись от руки",dur:5,icon:"▤",tag:"dlPFC активация",color:"#84CC16",
   why:"Письмо от руки требует удержания мысли в рабочей памяти. Прямая нагрузка на CEN -- в отличие от печати, которая автоматична."},
  {id:"deep_work",label:"Экзистенциальная безопасность",dur:50,icon:"■",tag:"Главная тренировка",color:"#84CC16",
   why:"50 минут одной задачи без переключений. Телефон в другой комнате. Это и есть силовая тренировка dlPFC: каждый момент удержания внимания — повторение."},
  {id:"walk",label:"Прогулка без телефона",dur:20,icon:"◇",tag:"DMN↔CEN синхронизация",color:"#84CC16",
   why:"Во время ходьбы без стимуляции DMN и CEN синхронизируются. Это не отдых -- интеграция. Поэтому лучшие идеи приходят на прогулке."},
  {id:"cleaning",label:"Порядок",dur:20,icon:"◈",tag:"И вещей, и мыслей",color:"#84CC16",
   why:"Порядок и в вещах, и в мыслях. 20 минут уборки = десятки завершённых циклов CEN. Убранное пространство снижает фоновую нагрузку на внимание — меньше мест где зацепится мысль."},
  {id:"onething",label:"Одно дело дома",dur:15,icon:"◆",tag:"Закрытый цикл",color:"#84CC16",
   why:"Одна задача, одно завершение. Не важно что: помыть посуду, разобрать стол. Главное — начал и закончил. Это полный цикл CEN."},
  {id:"food_plan",label:"План на еду на завтра",dur:0,icon:"□",tag:"Снять решение",color:"#84CC16",
   why:"Решение что есть завтра принимается сегодня вечером. Утром CEN не тратится на выбор и не ловится на импульс к мусорной еде. Свежая CEN утром просто исполняет."},
  {id:"drink",label:"Кефир и тёплая вода",dur:0,icon:"○",tag:"Подготовка ко сну",color:"#84CC16",
   why:"Кефир даёт триптофан — предшественник серотонина и мелатонина. Тёплая вода успокаивает ЖКТ и снижает кортизол. Оба сигнала телу что день закончен."},
  {id:"bath",label:"Горячая ванна",dur:0,icon:"◑",tag:"Вечерний ритуал",color:"#84CC16",
   why:"Горячая ванна за 1--2 часа до сна снижает температуру тела после выхода, что ускоряет засыпание и улучшает глубокий сон. Прямо влияет на восстановление prefrontal cortex за ночь."},
  {id:"sleep",label:"Фиксированный отбой",dur:0,icon:"☽",tag:"Базовое условие",color:"#84CC16",
   why:"Одна ночь недосыпа снижает производительность prefrontal cortex на 20--30%. Никакие практики это не компенсируют."}
];

var TASK_GROUPS={
  morning:["calibration","meditation","washing","breakfast","walk"],
  day:["writing","deep_work","onething"],
  evening:["food_plan","cleaning","bath","drink","lying","sleep"]
};
var CARDS=[
  {title:"Что такое CEN",sub:"Исполнительная сеть",icon:"◈",color:"#84CC16",
   body:"CEN -- CEO мозга. Дорсолатеральная префронтальная кора (dlPFC) и задняя теменная кора. Отвечает за рабочую память, планирование, решения, подавление импульсов. Самая энергозатратная сеть."},
  {title:"Три сети мозга",sub:"Как взаимодействуют",icon:"◎",color:"#84CC16",
   body:"DMN -- внутренний рассказчик, активна в покое и при сериалах. CEN -- директор, активна при усилии. SN -- модератор между ними, решает кому слово. В медитации тренируется связка SN↔CEN."},
  {title:"Медитация: механизм",sub:"4 фазы",icon:"◉",color:"#1A1A1A",
   body:"(1) фокус -- CEN активна; (2) пришла мысль -- DMN захватывает; (3) заметили мысль -- SN сработала; (4) вернули внимание -- CEN снова. Шаг 3→4 и есть повторение. Реакция: заметить → назвать → вернуться."},
  {title:"Планирование тренирует CEN",sub:"Даже сериал и пицца",icon:"▣",color:"#84CC16",
   body:"CEN тренирует структура, не содержание. Запланировал сериал -- CEN активна. Остановился по плану -- подавление импульса = тренировка dlPFC. Сериал по плану лучше, чем бесплановая полезная активность."},
  {title:"Мысли в медитации",sub:"Откуда и как реагировать",icon:"✦",color:"#84CC16",
   body:"Мысли -- это DMN. Момент когда заметили -- это SN. Бороться нельзя: усиливает мысль. Правильно: заметить → назвать тип (планирование, воспоминание) → не оценивать → вернуться к дыханию."},
  {title:"Микро-задачи и CEN",sub:"1 минута уборки",icon:"◉",color:"#84CC16",
   body:"CEN тренирует завершённые циклы: решил → сделал → завершил. 1 минута уборки = 1 цикл. Для истощённой CEN много маленьких циклов эффективнее одного большого. Не заменяют длинные блоки -- там другая адаптация."},
  {title:"Почему соцсети разрушают CEN",sub:"Механизм истощения",icon:"⚡",color:"#84CC16",
   body:"Соцсети требуют поверхностного переключения. CEN активируется без нагрузки -- как стоять с гантелями не поднимая. Каждое переключение -- микро-выброс дофамина, снижающий порог стимуляции."}
];
var EQ=[
  {id:"focus",label:"Легко ли удерживать фокус?",inv:false},
  {id:"phone",label:"Тянулся к телефону бессознательно?",inv:true},
  {id:"clarity",label:"Ясность мышления сейчас?",inv:false}
];

var DEFAULT_DEBUFFS=[
  {id:"social",label:"Instagram, YouTube",icon:"▢",tag:"Соц. сети"},
  {id:"warcraft",label:"Warcraft",icon:"◇",tag:"Игры"},
  {id:"porn",label:"Просмотр порно",icon:"◐",tag:"Дофамин"},
  {id:"junkfood",label:"Вредная еда",icon:"●",tag:"Дофамин"}
];

var state={tab:"morning",checked:{},history:[],checkin:null,openTask:null,scores:{}};

function today(){return new Date().toISOString().split("T")[0];}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function init(){
var ch=load("cen:checked:"+today());
var hi=load("cen:history");
var ci=load("cen:checkin:"+today());
if(ch)state.checked=ch;
if(hi)state.history=hi;
if(ci)state.checkin=ci;
render();
}

function getDebuffs(){return load("cen:debuffs")||DEFAULT_DEBUFFS;}
function getDebuffLog(date){return load("cen:debuff_log:"+(date||today()))||{};}
function setDebuffMinutes(id,n){
var log=getDebuffLog();
log[id]=Math.max(0,n|0);
save("cen:debuff_log:"+today(),log);
render();
}
function addDebuffMinutes(id,delta){
var log=getDebuffLog();
setDebuffMinutes(id,(log[id]||0)+delta);
}
function editDebuffMinutes(id){
var log=getDebuffLog();
var current=log[id]||0;
var input=prompt("Минуты сегодня:",String(current));
if(input===null)return;
var n=parseInt(input,10);
if(isNaN(n))return;
setDebuffMinutes(id,n);
}
function getDebuffTotal(date){
var log=getDebuffLog(date);
var total=0;
Object.keys(log).forEach(function(k){total+=log[k]||0;});
return total;
}

function el(tag,attr,html){
var e=document.createElement(tag);
if(attr)Object.keys(attr).forEach(function(k){
if(k==="style")Object.assign(e.style,attr[k]);
else if(k==="onclick")e.onclick=attr[k];
else e.setAttribute(k,attr[k]);
});
if(html!==undefined)e.innerHTML=html;
return e;
}

function getActiveDays(){
var dates={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(!k)continue;
if(k.indexOf("cen:checked:")===0){
try{var d=JSON.parse(localStorage.getItem(k));
if(d&&Object.values(d).some(function(v){return v;}))dates[k.substring(12)]=true;
}catch(e){}
}
if(k.indexOf("cen:checkin:")===0)dates[k.substring(12)]=true;
}
return Object.keys(dates).length;
}

function renderHeader(){
var days=Math.max(getActiveDays(),state.history.length);
var phase=days<14?{n:1,label:"Стабилизация",color:"#8B8B85"}:days<42?{n:2,label:"Строим",color:"#1A1A1A"}:{n:3,label:"Закрепление",color:"#84CC16"};
var done=Object.values(state.checked).filter(Boolean).length;
var pct=Math.round(done/TASKS.length*100);
var html='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:12px">';
html+='<div style="font-size:28px;font-weight:600;color:#1A1A1A;letter-spacing:1px;line-height:1.1;text-transform:uppercase">CEN Trainer</div>';
html+='<div style="text-align:right;flex-shrink:0;padding-top:6px">';
html+='<div style="font-size:10px;color:'+phase.color+';font-weight:600;text-transform:uppercase;letter-spacing:1.2px">'+phase.label+'</div>';
html+='<div style="font-size:11px;color:#8B8B85;margin-top:4px">'+days+' дн</div></div></div>';
html+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:8px">';
html+='<span style="font-size:11px;color:#8B8B85">Прогресс дня</span>';
html+='<span style="font-size:11px;color:#1A1A1A;font-weight:600">'+done+'/'+TASKS.length+'</span></div>';
html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
document.getElementById("header").innerHTML=html;
}

function renderBottomNav(){
var tabs=[{id:"morning",label:"Утро",icon:"◎"},{id:"day",label:"День",icon:"▣"},{id:"evening",label:"Вечер",icon:"◐"},{id:"summary",label:"Сводка",icon:"◈"}];
var html='';
tabs.forEach(function(t){
html+='<button class="tab'+(state.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">';
html+='<div class="tab-icon">'+t.icon+'</div>'+t.label+'</button>';
});
document.getElementById("bottom-nav").innerHTML=html;
}

function setTab(t){state.tab=t;render();}

function toggleTask(id){
state.checked[id]=!state.checked[id];
save("cen:checked:"+today(),state.checked);
render();
}

function openTask(id){
state.openTask=state.openTask===id?null:id;
render();
}

function findTask(id){for(var i=0;i<TASKS.length;i++)if(TASKS[i].id===id)return TASKS[i];return null;}

function taskCard(t){
var ch=!!state.checked[t.id];
var open=state.openTask===t.id;
var html='<div style="background:#FFFFFF;border:1px solid #ECECEA;border-radius:22px;margin-bottom:10px;overflow:hidden">';
html+='<div style="display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer" onclick="openTask(\''+t.id+'\')">';
html+='<div style="width:40px;height:40px;border-radius:14px;background:'+(ch?"#C8FF5A":t.color+"1F")+';display:flex;align-items:center;justify-content:center;font-size:16px;color:'+(ch?"#1A1A1A":t.color)+';flex-shrink:0;font-weight:300">'+t.icon+'</div>';
html+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500;color:'+(ch?"#8B8B85":"#1A1A1A")+';text-decoration:'+(ch?"line-through":"none")+';letter-spacing:-0.1px">'+t.label+'</div>';
html+='<div style="font-size:11px;color:'+t.color+';margin-top:3px;font-weight:500">'+t.tag+'</div></div>';
html+='<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">';
if(t.dur>0)html+='<span style="font-size:11px;color:#8B8B85">'+t.dur+'м</span>';
html+='<div onclick="event.stopPropagation();toggleTask(\''+t.id+'\')" style="width:26px;height:26px;border-radius:9px;border:'+(ch?"none":"1.5px solid #D8D8D5")+';background:'+(ch?"#1A1A1A":"transparent")+';display:flex;align-items:center;justify-content:center;cursor:pointer;color:'+(ch?"#C8FF5A":"transparent")+';font-size:13px;font-weight:600">'+(ch?"✓":"")+'</div>';
html+='</div></div>';
if(open){
html+='<div style="border-top:1px solid #F0F0EE;padding:16px 18px">';
html+='<div style="font-size:12px;color:#5A5A55;line-height:1.7;background:'+t.color+'10;border-radius:14px;padding:12px 14px">'+t.why+'</div>';
html+='</div>';
}
html+='</div>';
return html;
}

function renderTaskGroup(ids){
var done=ids.filter(function(id){return !!state.checked[id];}).length;
var html='<div style="font-size:12px;color:#8B8B85;margin-bottom:14px;line-height:1.6">'+done+' из '+ids.length+' выполнено.</div>';
ids.forEach(function(id){var t=findTask(id);if(t)html+=taskCard(t);});
return html;
}

function renderMorning(){return renderTaskGroup(TASK_GROUPS.morning);}
function renderDay(){return renderTaskGroup(TASK_GROUPS.day);}
function renderEveningTasks(){return renderTaskGroup(TASK_GROUPS.evening);}

function renderQuestionnaire(){
if(state.checkin){
var html='<div style="display:flex;gap:8px;margin-bottom:14px">';
EQ.forEach(function(q){
var v=state.checkin[q.id];
var disp=q.inv?6-v:v;
html+='<div style="flex:1;background:#F9F9F7;border:1px solid #ECECEA;border-radius:16px;padding:14px 6px;text-align:center">';
html+='<div style="font-size:24px;font-weight:600;color:#1A1A1A;letter-spacing:-0.5px">'+disp+'</div>';
html+='<div style="font-size:10px;color:#8B8B85;margin-top:4px">'+(q.id==="focus"?"фокус":q.id==="phone"?"без тел.":"ясность")+'</div></div>';
});
html+='</div>';
html+='<button onclick="resetCheckin()" style="width:100%;background:transparent;border:1px solid #ECECEA;color:#8B8B85;border-radius:14px;padding:10px;font-size:11px;cursor:pointer">Изменить ответы</button>';
return html;
}
var html='';
EQ.forEach(function(q){
html+='<div style="margin-bottom:18px"><div style="font-size:13px;color:#1A1A1A;margin-bottom:10px;font-weight:500">'+q.label+'</div><div style="display:flex;gap:6px">';
[1,2,3,4,5].forEach(function(n){
var sel=state.scores[q.id]===n;
html+='<button onclick="setScore(\''+q.id+'\','+n+')" class="score-btn'+(sel?" selected":"")+'" style="height:42px">'+n+'</button>';
});
html+='</div></div>';
});
var ready=EQ.every(function(q){return state.scores[q.id]!==undefined;});
if(ready)html+='<button class="save-btn" onclick="saveDay()">Сохранить день</button>';
return html;
}

function renderSummary(){
var html=renderDebuffs();
html+='<div class="card" style="margin-top:16px"><div style="font-size:11px;color:#8B8B85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Вечерний опрос</div>';
html+=renderQuestionnaire();
html+='</div>';
if(state.history.length>0){
html+='<div class="card" style="margin-top:12px"><div style="font-size:11px;color:#8B8B85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">История · '+state.history.length+' дн.</div>';
html+=renderChart()+'</div>';
}
html+=renderBackup();
return html;
}

function setScore(id,n){state.scores[id]=n;render();}

function saveDay(){
var entry={date:today(),focus:state.scores.focus,phone:state.scores.phone,clarity:state.scores.clarity};
state.history=state.history.filter(function(h){return h.date!==today();});
state.history.push(entry);
state.checkin=state.scores;
save("cen:history",state.history);
save("cen:checkin:"+today(),state.scores);
render();
}

function resetCheckin(){state.checkin=null;render();}

function renderDebuffs(){
var debuffs=getDebuffs();
var log=getDebuffLog();
var total=getDebuffTotal();
var html='<div class="card" style="margin-top:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
html+='<div style="font-size:10px;color:#8B8B85;text-transform:uppercase;letter-spacing:1.5px;font-weight:500">Debuff</div>';
html+='<div style="font-size:11px;color:#8B8B85">сегодня <span style="color:'+(total>0?"#1A1A1A":"#1A1A1A")+';font-weight:600">'+total+'м</span></div></div>';
html+='<div style="font-size:11px;color:#8B8B85;line-height:1.6;margin-bottom:14px">Что забирает ресурс CEN. Залогируй минуты — без оценок, просто факт.</div>';
debuffs.forEach(function(d){
var mins=log[d.id]||0;
html+='<div style="display:flex;align-items:center;gap:12px;background:#F9F9F7;border:1px solid #ECECEA;border-radius:18px;padding:12px;margin-bottom:8px">';
html+='<div style="width:36px;height:36px;border-radius:12px;background:#F4F4F2;display:flex;align-items:center;justify-content:center;font-size:14px;color:#1A1A1A;flex-shrink:0;font-weight:300">'+d.icon+'</div>';
html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:#1A1A1A">'+d.label+'</div>';
html+='<div style="font-size:10px;color:#8B8B85;margin-top:2px">'+d.tag+'</div></div>';
html+='<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">';
html+='<button onclick="addDebuffMinutes(\''+d.id+'\',-5)" style="width:30px;height:30px;border-radius:10px;background:#FFFFFF;border:1px solid #ECECEA;color:#1A1A1A;font-size:14px;cursor:pointer;padding:0;font-weight:500">−</button>';
html+='<div onclick="editDebuffMinutes(\''+d.id+'\')" style="min-width:46px;text-align:center;font-size:13px;font-weight:600;color:'+(mins>0?"#1A1A1A":"#8B8B85")+';cursor:pointer">'+mins+'м</div>';
html+='<button onclick="addDebuffMinutes(\''+d.id+'\',5)" style="width:30px;height:30px;border-radius:10px;background:#FFFFFF;border:1px solid #ECECEA;color:#1A1A1A;font-size:14px;cursor:pointer;padding:0;font-weight:500">+</button>';
html+='</div></div>';
});
html+='</div>';
return html;
}

function renderChart(){
if(!state.history.length)return '<div style="text-align:center;color:#8B8B85;font-size:12px;padding:20px 0">Данные появятся после первого чекина</div>';
var sorted=state.history.slice().sort(function(a,b){return a.date<b.date?-1:1;});
var last=sorted.slice(-14);
function score(d){return Math.round((d.focus+(6-d.phone)+d.clarity)/3);}
var avg=(sorted.reduce(function(a,d){return a+score(d);},0)/sorted.length).toFixed(1);
var trend=last.length>=2?score(last[last.length-1])-score(last[0]):0;
var dateSet={};
sorted.forEach(function(d){dateSet[d.date]=true;});
var streak=0;
var dt=new Date();
if(!dateSet[dt.toISOString().split("T")[0]])dt.setDate(dt.getDate()-1);
for(var i=0;i<400;i++){
var key=dt.toISOString().split("T")[0];
if(dateSet[key]){streak++;dt.setDate(dt.getDate()-1);}
else break;
}
var days=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
var html='<div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:8px">';
last.forEach(function(d){
var s=score(d);
var h=Math.max(8,s/5*68);
html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">';
html+='<span style="font-size:9px;color:#1A1A1A;font-weight:600">'+s+'</span>';
html+='<div class="chart-bar" style="width:100%;height:'+h+'px"></div></div>';
});
html+='</div><div style="display:flex;gap:4px;margin-bottom:14px">';
last.forEach(function(d){html+='<div style="flex:1;text-align:center;font-size:8px;color:#8B8B85">'+days[new Date(d.date).getDay()]+'</div>';});
html+='</div><div style="display:flex;gap:8px">';
html+='<div style="flex:1;background:#F9F9F7;border:1px solid #ECECEA;border-radius:14px;padding:12px 8px;text-align:center"><div style="font-size:20px;font-weight:600;color:#1A1A1A;letter-spacing:-0.3px">'+avg+'</div><div style="font-size:10px;color:#8B8B85;margin-top:2px">средний</div></div>';
html+='<div style="flex:1;background:#F9F9F7;border:1px solid #ECECEA;border-radius:14px;padding:12px 8px;text-align:center"><div style="font-size:20px;font-weight:600;color:#1A1A1A;letter-spacing:-0.3px">'+streak+'</div><div style="font-size:10px;color:#8B8B85;margin-top:2px">стрик</div></div>';
html+='<div style="flex:1;background:'+(trend>=0?"rgba(200,255,90,0.25)":"#F9F9F7")+';border:1px solid '+(trend>=0?"rgba(200,255,90,0.6)":"#ECECEA")+';border-radius:14px;padding:12px 8px;text-align:center"><div style="font-size:20px;font-weight:600;color:'+(trend>=0?"#1A1A1A":"#EC4899")+';letter-spacing:-0.3px">'+(trend>0?"+":"")+trend+'</div><div style="font-size:10px;color:#8B8B85;margin-top:2px">динамика</div></div>';
html+='</div>';
var todayDebuff=getDebuffTotal();
var debuffSum=0,debuffCount=0;
last.forEach(function(d){var t=getDebuffTotal(d.date);if(t>0){debuffSum+=t;debuffCount++;}});
var avgDebuff=debuffCount?Math.round(debuffSum/debuffCount):0;
html+='<div style="margin-top:10px;padding:11px 14px;background:#F9F9F7;border:1px solid #ECECEA;border-radius:14px;display:flex;justify-content:space-between;align-items:center;font-size:11px">';
html+='<span style="color:#8B8B85">Debuff сегодня</span>';
html+='<span style="color:'+("#1A1A1A")+';font-weight:600">'+todayDebuff+'м<span style="color:#8B8B85;font-weight:400"> · среднее '+avgDebuff+'м</span></span>';
html+='</div>';
return html;
}

function exportData(){
var data={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k&&k.indexOf("cen:")===0){
try{data[k]=JSON.parse(localStorage.getItem(k));}
catch(e){data[k]=localStorage.getItem(k);}
}
}
var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;a.download="cen-trainer-"+today()+".json";
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(url);},100);
}

function importData(){
var input=document.createElement("input");
input.type="file";input.accept=".json,application/json";
input.onchange=function(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
var count=0;
Object.keys(data).forEach(function(k){
if(k.indexOf("cen:")===0){localStorage.setItem(k,JSON.stringify(data[k]));count++;}
});
state.history=load("cen:history")||[];
state.checked=load("cen:checked:"+today())||{};
state.checkin=load("cen:checkin:"+today());
render();
alert("Импортировано: "+count+" записей");
}catch(err){alert("Ошибка импорта: "+err.message);}
};
reader.readAsText(file);
};
input.click();
}

function renderBackup(){
var html='<div class="card" style="margin-top:16px"><div style="font-size:10px;color:#8B8B85;margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:500">Резервная копия</div>';
html+='<div style="font-size:11px;color:#8B8B85;line-height:1.6;margin-bottom:14px">Данные хранятся только в этом браузере. Сохрани JSON, чтобы перенести на другое устройство.</div>';
html+='<div style="display:flex;gap:8px">';
html+='<button onclick="exportData()" style="flex:1;background:#1A1A1A;border:none;color:#FFFFFF;border-radius:14px;padding:12px;font-size:12px;font-weight:500;cursor:pointer">Скачать</button>';
html+='<button onclick="importData()" style="flex:1;background:transparent;border:1px solid #ECECEA;color:#1A1A1A;border-radius:14px;padding:12px;font-size:12px;font-weight:500;cursor:pointer">Загрузить</button>';
html+='</div></div>';
return html;
}

function render(){
renderHeader();
renderBottomNav();
var html="";
if(state.tab==="morning")html=renderMorning();
else if(state.tab==="day")html=renderDay();
else if(state.tab==="evening")html=renderEveningTasks();
else html=renderSummary();
document.getElementById("content").innerHTML=html;
}

init();
</script>
