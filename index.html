<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#F4F4F2;
--surface:#FFFFFF;
--border:#ECECEA;
--text:#1A1A1A;
--muted:#8B8B85;
--soft:#C8C8C5;
--accent:#C8FF5A;
--accent-dark:#84CC16;
--purple:#7C6AFF;
--orange:#FB923C;
--pink:#EC4899;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;font-weight:400;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;font-weight:500}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:28px 22px 0;background:var(--bg);position:sticky;top:0;z-index:10}
.content{flex:1;padding:0 22px 130px;overflow-y:auto}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--bg);padding:8px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:100}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:6px}
.tab{flex:1;padding:10px 4px;border-radius:20px;background:transparent;color:var(--muted);font-size:10px;font-weight:500;text-align:center;letter-spacing:0.3px}
.tab.active{background:var(--accent);color:var(--text);font-weight:600}
.tab-icon{font-size:14px;margin-bottom:3px;font-weight:300}
.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:20px;margin-bottom:14px}
.row{display:flex;align-items:center;gap:12px}
.progress-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;border-radius:6px;background:var(--accent-dark);transition:width 0.5s ease}
.task-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:transform 0.15s ease}
.task-row.done{background:rgba(200,255,90,0.18);border-color:rgba(200,255,90,0.6)}
.task-icon{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:300}
.score-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
.score-btn.selected{background:var(--accent);border-color:var(--accent);color:var(--text);font-weight:600}
.save-btn{width:100%;padding:15px;border-radius:18px;background:var(--accent);border:none;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
.chart-bar{border-radius:6px;background:var(--accent);transition:height 0.6s ease}
@keyframes celebrate{0%{transform:scale(1)}35%{transform:scale(1.7)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.emoji-pop{display:inline-block;animation:celebrate 0.75s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes affEnter{from{transform:translateY(-32px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes affExit{from{transform:translateY(0);opacity:1}to{transform:translateY(64px);opacity:0}}
.aff-card{animation:affEnter 0.7s cubic-bezier(0.34,1.2,0.64,1) both}
.aff-exit{animation:affExit 0.6s ease-in both}
@keyframes finalFade{0%{opacity:0;transform:scale(0.96)}25%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}
.aff-final{animation:finalFade 2.4s ease-in-out both}
</style>
</head>

var TASKS=[
  {id:"calibration",label:"Калибровка · дыхание",dur:3,icon:"▲",tag:"Гашение DMN",color:"#84CC16",

  {id:"lying",label:"Лежите без телефона",dur:3,icon:"⌒",tag:"Мягкий запуск",color:"#84CC16",

  {id:"meditation",label:"Медитация",dur:9,icon:"◎",tag:"CEN напрямую",color:"#84CC16",

  {id:"main_thought",label:"Записать фокус дня",dur:5,icon:"◉",tag:"Якорь дня",color:"#84CC16",
   why:"Утром у ENFP активны десятки направлений сразу — клиенты, идеи, проекты. Всё кажется срочным. Без одного фокуса весь день реагируешь на входящее, вместо того чтобы создавать главное.\n\nНе список — список для ENFP это тревога в письменном виде. Одна мысль — это направление, не обязательство. «Сегодня я про клиентов» вместо «позвонить, дописать, разобрать, обновить». Первое давит, второе ориентирует.\n\nЭто якорь при турбулентности: когда в 14:00 ты потерялся и не знаешь за что взяться — возвращаешься к ней. Один из трёх несущих элементов дня вместе с медитацией и физической нагрузкой."},
  {id:"water_light",label:"Тёплая вода и свет",dur:5,icon:"◔",tag:"Запуск организма",color:"#84CC16",

  {id:"washing",label:"Умывание",dur:15,icon:"◐",tag:"Закрытый цикл",color:"#84CC16",

  {id:"breakfast",label:"Завтрак",dur:20,icon:"●",tag:"Глюкоза для dlPFC",color:"#84CC16",

  {id:"deep_work",label:"Экзистенциальная безопасность",dur:50,icon:"■",tag:"Главная тренировка",color:"#84CC16",

  {id:"clients",label:"Спокойствие души",dur:50,icon:"⊙",tag:"Внимание клиентам",color:"#84CC16",

  {id:"empire",label:"Создаю империю",dur:50,icon:"◙",tag:"Новые проекты",color:"#84CC16",

  {id:"sport",label:"Тренировка",dur:30,icon:"▶",tag:"Бокс или турник",color:"#84CC16",

  {id:"english",label:"English",dur:15,icon:"◖",tag:"Язык миру",color:"#84CC16",

  {id:"book",label:"Чтение книг",dur:20,icon:"▭",tag:"Только чтение",color:"#84CC16",

  {id:"walk",label:"Прогулка без телефона",dur:20,icon:"◇",tag:"DMN↔CEN синхронизация",color:"#84CC16",

  {id:"food_plan",label:"План на еду на завтра",dur:0,icon:"□",tag:"Снять решение",color:"#84CC16",

  {id:"drink",label:"Кефир и тёплая вода",dur:15,icon:"○",tag:"Отдых и тепло",color:"#84CC16",

  {id:"bath",label:"Горячая ванна / душ",dur:20,icon:"◑",tag:"Вечерний ритуал",color:"#84CC16",

  {id:"tomorrow_focus",label:"Завтрашний фокус",dur:1,icon:"☀",tag:"Одно слово или фраза на завтра",color:"#84CC16",

  {id:"sleep",label:"Фиксированный отбой",dur:0,icon:"☽",tag:"Базовое условие",color:"#84CC16",

  {id:"onething",label:"Одно дело дома",dur:15,icon:"⌂",tag:"Если есть ресурс",color:"#84CC16",

  {id:"desk",label:"Разобрать стол",dur:10,icon:"▤",tag:"По потоку",color:"#84CC16",

  {id:"wildcard",label:"Дикая карта",dur:30,icon:"✦",tag:"Свободный выбор",color:"#84CC16",

var MORNING_BASE=["washing","breakfast"];
var MORNING_FREE=["onething","desk","wildcard"];
var EVENING_FREE=["book"];
var THEMES=[
  {id:"empire",label:"Создаю империю",days:[1,4],sub:"Пн / Чт",desc:"День действия, роста и новых проектов."},

  {id:"light",label:"Лёгкий",color:"#84CC16",b1:25,pause:30,b2:25}
];
var CARDS=[
  {title:"Что такое CEN",sub:"Исполнительная сеть",icon:"◈",color:"#84CC16",
   body:"CEN -- CEO мозга. Дорсолатеральная префронтальная кора (dlPFC) и задняя теменная кора. Отвечает за рабочую память, планирование, решения, подавление импульсов. Самая энергозатратная сеть."},
  {title:"Три сети мозга",sub:"Как взаимодействуют",icon:"◎",color:"#84CC16",

  {title:"Медитация: механизм",sub:"4 фазы",icon:"◉",color:"#1A1A1A",
   body:"(1) фокус -- CEN активна; (2) пришла мысль -- DMN захватывает; (3) заметили мысль -- SN сработала; (4) вернули внимание -- CEN снова. Шаг 3→4 и есть повторение. Реакция: заметить → назвать → вернуться."},
  {title:"Планирование тренирует CEN",sub:"Даже сериал и пицца",icon:"▣",color:"#84CC16",

  {title:"Мысли в медитации",sub:"Откуда и как реагировать",icon:"✦",color:"#84CC16",

var DEFAULT_AFFIRMATIONS=[
  {id:"books",icon:"📚",title:"Читающий книги",text:"Я человек, который развивается каждый день."},
  {id:"body",icon:"💪",title:"Спортивное тело",text:"Я выбираю силу и здоровье."},
  {id:"english",icon:"🇺🇸",title:"Свободно говорю на английском",text:"Я свободно выражаю мысли миру."},
  {id:"wealth",icon:"💵",title:"Я сказочно богат",text:"Я создаю ценность и изобилие."}
];

var state={tab:"morning",checked:{},openTask:null,celebrating:null,intro:null,focusText:"",themeOverride:null,priority:"medium",sportChoice:null,editingFocus:false,themeSheet:false,eveningNote:"",editingNote:false,period:"week"};

function today(){return new Date().toISOString().split("T")[0];}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function init(){
var ch=load("cen:checked:"+today());
var fc=load("cen:focus:"+today());
var th=load("cen:theme:"+today());
var pr=load("cen:priority:"+today());
var sp=load("cen:sport:"+today());
var en=load("cen:evening_note:"+today());
if(ch)state.checked=ch;
if(en)state.eveningNote=en;
if(fc)state.focusText=fc;
if(th)state.themeOverride=th;
if(pr)state.priority=pr;
if(sp)state.sportChoice=sp;
maybeStartIntro();
render();
}

function findTheme(id){for(var i=0;i<THEMES.length;i++)if(THEMES[i].id===id)return THEMES[i];return null;}
function getActiveTheme(){
if(state.themeOverride){var t=findTheme(state.themeOverride);if(t)return t;}
var dow=new Date().getDay();
for(var i=0;i<THEMES.length;i++)if(THEMES[i].days.indexOf(dow)!==-1)return THEMES[i];
return THEMES[0];
}
function getPriority(){for(var i=0;i<PRIORITIES.length;i++)if(PRIORITIES[i].id===state.priority)return PRIORITIES[i];return PRIORITIES[1];}
function toggleFocusEdit(){state.editingFocus=!state.editingFocus;render();if(state.editingFocus)setTimeout(function(){var e=document.getElementById("focus-input");if(e)e.focus();},60);}
function saveFocus(){var e=document.getElementById("focus-input");if(e){state.focusText=e.value.trim();save("cen:focus:"+today(),state.focusText);}state.editingFocus=false;render();}
function setPriority(id){state.priority=id;save("cen:priority:"+today(),id);render();}
function setTheme(id){state.themeOverride=id;save("cen:theme:"+today(),id);state.themeSheet=false;render();}
function toggleThemeSheet(){state.themeSheet=!state.themeSheet;render();}
function setSport(c){state.sportChoice=c;save("cen:sport:"+today(),c);render();}

function getAffirmations(){return load("cen:affirmations")||DEFAULT_AFFIRMATIONS;}

function maybeStartIntro(){
var hour=new Date().getHours();
if(hour>=11)return;
if(load("cen:intro:"+today())==="done")return;
state.intro=true;
}

function finishIntro(){
save("cen:intro:"+today(),"done");
state.intro=null;
render();
}

function el(tag,attr,html){
var e=document.createElement(tag);
if(attr)Object.keys(attr).forEach(function(k){
if(k==="style")Object.assign(e.style,attr[k]);
else if(k==="onclick")e.onclick=attr[k];
else e.setAttribute(k,attr[k]);
});
if(html!==undefined)e.innerHTML=html;
return e;
}

function getActiveDays(){
var dates={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(!k)continue;
if(k.indexOf("cen:checked:")===0){
try{var d=JSON.parse(localStorage.getItem(k));
if(d&&Object.values(d).some(function(v){return v;}))dates[k.substring(12)]=true;
}catch(e){}
}
if(k.indexOf("cen:checkin:")===0)dates[k.substring(12)]=true;
}
return Object.keys(dates).length;
}

function renderHeader(){
var days=getActiveDays();
var phase=days<14?{n:1,label:"Стабилизация",color:"#8B8B85"}:days<42?{n:2,label:"Строим",color:"#1A1A1A"}:{n:3,label:"Закрепление",color:"#84CC16"};
var tab=state.tab;
var html='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:'+(tab==="summary"?"20px":"26px")+';gap:12px">';
html+='<div style="font-size:28px;font-weight:600;color:#1A1A1A;letter-spacing:1px;line-height:1.1;text-transform:uppercase">CEN Trainer</div>';

function setTab(t){state.tab=t;render();}

function checkGroupDone(id){
Object.keys(TASK_GROUPS).forEach(function(g){
var ids=TASK_GROUPS[g];
if(ids.indexOf(id)===-1)return;
if(ids.every(function(i){return !!state.checked[i];}))celebrate(g);
});
}

function toggleTask(id){
var wasChecked=!!state.checked[id];
state.checked[id]=!wasChecked;
save("cen:checked:"+today(),state.checked);
if(!wasChecked)checkGroupDone(id);
render();
}

function celebrate(group){
try{if(navigator.vibrate)navigator.vibrate([60,40,80]);}catch(e){}
state.celebrating=group;
setTimeout(function(){state.celebrating=null;render();},800);
}

function toggleNoteEdit(){state.editingNote=!state.editingNote;render();if(state.editingNote)setTimeout(function(){var e=document.getElementById("note-input");if(e)e.focus();},60);}
function saveEveningNote(){
var e=document.getElementById("note-input");
var wasFilled=!!state.checked.evening_note;
if(e)state.eveningNote=e.value.trim();
save("cen:evening_note:"+today(),state.eveningNote);
state.checked.evening_note=!!state.eveningNote;
save("cen:checked:"+today(),state.checked);
state.editingNote=false;
if(state.checked.evening_note&&!wasFilled)checkGroupDone("evening_note");
render();
}

function openTask(id){
state.openTask=state.openTask===id?null:id;
render();
}

function renderTaskGroup(ids){

function formatDur(mins){
if(mins<60)return mins+"м";
var h=Math.floor(mins/60),m=mins%60;
return h+"ч"+(m?" "+(m<10?"0":"")+m+"м":"");
}

var html='<div class="card" style="margin-top:18px"><div style="font-size:11px;color:#8B8B85;margin-bottom:8px">Базовые ритуалы <span style="color:#C8C8C5">(без отметки)</span></div>';

var MONTHS=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
var DOW=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

function setPeriod(p){state.period=p;render();}
function dateAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];}
function fmtDate(ds){var d=new Date(ds);return d.getDate()+" "+MONTHS[d.getMonth()];}
function plural(n,a,b,cc){var m=n%10,d=n%100;if(m===1&&d!==11)return a;if(m>=2&&m<=4&&(d<10||d>=20))return b;return cc;}

function periodDates(){
if(state.period==="day")return [today()];
if(state.period==="month"){var a=[];for(var i=29;i>=0;i--)a.push(dateAgo(i));return a;}
var now=new Date(),dow=now.getDay(),off=(dow===0?-6:1-dow),a=[];
for(var i=0;i<7;i++){var d=new Date(now);d.setDate(now.getDate()+off+i);a.push(d.toISOString().split("T")[0]);}
return a;
}

function dayEnergy(ds){
var ch=(ds===today())?state.checked:(load("cen:checked:"+ds)||{});
var m=TASK_GROUPS.morning.filter(function(id){return !!ch[id];}).length;
var dd=TASK_GROUPS.day.filter(function(id){return !!ch[id];}).length;
var e=TASK_GROUPS.evening.filter(function(id){return !!ch[id];}).length;
var pct=0.75*(dd/TASK_GROUPS.day.length)+0.25*((m+e)/(TASK_GROUPS.morning.length+TASK_GROUPS.evening.length));
return Math.round(pct*100);
}
function energyLevel(pct){
if(pct>=67)return {label:"Высокая",color:"#84CC16",face:"🙂"};
if(pct>=34)return {label:"Средняя",color:"#FACC15",face:"😐"};
if(pct>0)return {label:"Низкая",color:"#F97316",face:"🙁"};
return {label:"—",color:"#ECECEA",face:"·"};
}

function collectMoments(dates){
var ds={};dates.forEach(function(d){ds[d]=1;});
var out=[];
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);if(!k)continue;
var date=null,src=null;
if(k.indexOf("cen:evening_note:")===0){date=k.substring(17);src="вечер";}
else if(k.indexOf("cen:focus:")===0){date=k.substring(10);src="день";}
else continue;
if(!ds[date])continue;
var txt=load(k);
if(txt&&typeof txt==="string"&&txt.trim())out.push({date:date,text:txt,src:src});
}
out.sort(function(a,b){return a.date<b.date?1:-1;});
return out;
}

function exportData(){
var data={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k&&k.indexOf("cen:")===0){
try{data[k]=JSON.parse(localStorage.getItem(k));}
catch(e){data[k]=localStorage.getItem(k);}
}
}
var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;a.download="cen-trainer-"+today()+".json";
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(url);},100);
}

function importData(){
var input=document.createElement("input");
input.type="file";input.accept=".json,application/json";
input.onchange=function(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
var count=0;
Object.keys(data).forEach(function(k){
if(k.indexOf("cen:")===0){localStorage.setItem(k,JSON.stringify(data[k]));count++;}
});
state.checked=load("cen:checked:"+today())||{};
state.eveningNote=load("cen:evening_note:"+today())||"";
state.focusText=load("cen:focus:"+today())||"";
render();
alert("Импортировано: "+count+" записей");
}catch(err){alert("Ошибка импорта: "+err.message);}
};
reader.readAsText(file);
};
input.click();
}
