<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CEN Trainer">
<title>CEN Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e8e6ff;font-family:system-ui,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 0;background:#0a0a0f;position:sticky;top:0;z-index:10}
.content{flex:1;padding:0 20px 80px;overflow-y:auto}
.tabs{display:flex;gap:4px;background:#13131a;border-radius:14px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border-radius:10px;background:transparent;color:#6b6a85;font-size:10px;font-weight:600;border-bottom:2px solid transparent;text-align:center}
.tab.active{background:rgba(124,106,255,0.15);color:#7c6aff;border-bottom:2px solid #7c6aff}
.tab-icon{font-size:14px;margin-bottom:2px}
.card{background:#13131a;border:1px solid #2a2a3a;border-radius:16px;padding:16px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px}
.badge{font-size:9px;font-weight:700;border-radius:6px;padding:3px 7px}
.progress-bar{height:4px;background:#2a2a3a;border-radius:4px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(to right,#7c6aff,#a78bfa);transition:width 0.5s}
.task-row{display:flex;align-items:center;gap:12px;background:#13131a;border:1px solid #2a2a3a;border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.task-row.done{background:rgba(74,222,128,0.04);border-color:rgba(74,222,128,0.25)}
.task-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.task-detail{border-top:1px solid #2a2a3a;padding:14px 16px}
.why-box{font-size:12px;color:#6b6a85;line-height:1.75;background:rgba(124,106,255,0.15);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #2a2a3a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:#000;font-size:12px;font-weight:800}
.checkbox.checked{background:#4ade80;border-color:#4ade80}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.timer-btn{padding:6px 18px;border-radius:8px;font-size:12px;font-weight:600}
.learn-card{background:#13131a;border:1px solid #2a2a3a;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.learn-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.score-btn{width:44px;height:44px;border-radius:10px;border:1px solid #2a2a3a;background:#13131a;color:#6b6a85;font-size:14px;font-weight:700;cursor:pointer}
.score-btn.selected{background:rgba(124,106,255,0.15);border-color:#7c6aff;color:#7c6aff}
.save-btn{width:100%;padding:13px;border-radius:12px;background:rgba(124,106,255,0.15);border:1px solid #7c6aff;color:#7c6aff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.chart-bar{border-radius:5px;background:linear-gradient(to top,#7c6aff,#3d3580);transition:height 0.6s}
</style>
</head>
<body>
<div class="app">
  <div class="header" id="header"></div>
  <div class="content" id="content"></div>
</div>
<script>
var TASKS=[
  {id:"meditation",label:"Медитация",dur:20,icon:"◎",tag:"CEN напрямую",color:"#7c6aff",
   why:"Каждый раз когда замечаете отвлечение и возвращаетесь -- dlPFC делает повторение. За 20 минут их 30--50. Силовая тренировка префронтальной коры."},
  {id:"writing",label:"Запись от руки",dur:5,icon:"✦",tag:"dlPFC активация",color:"#a78bfa",
   why:"Письмо от руки требует удержания мысли в рабочей памяти. Прямая нагрузка на CEN -- в отличие от печати, которая автоматична."},
  {id:"deep_work",label:"Глубокая работа",dur:50,icon:"▣",tag:"Главная тренировка",color:"#60a5fa",
   why:"Одна задача, телефон в другой комнате. Сам факт телефона рядом снижает ресурс CEN на 10--20%. Каждый момент без отвлечения -- повторение."},
  {id:"walk",label:"Прогулка без телефона",dur:20,icon:"◈",tag:"DMN↔CEN синхронизация",color:"#4ade80",
   why:"Во время ходьбы без стимуляции DMN и CEN синхронизируются. Это не отдых -- интеграция. Поэтому лучшие идеи приходят на прогулке."},
  {id:"sleep",label:"Фиксированный отбой",dur:0,icon:"◐",tag:"Базовое условие",color:"#fbbf24",
   why:"Одна ночь недосыпа снижает производительность prefrontal cortex на 20--30%. Никакие практики это не компенсируют."}
];
var CARDS=[
  {title:"Что такое CEN",sub:"Исполнительная сеть",icon:"◈",color:"#7c6aff",
   body:"CEN -- CEO мозга. Дорсолатеральная префронтальная кора (dlPFC) и задняя теменная кора. Отвечает за рабочую память, планирование, решения, подавление импульсов. Самая энергозатратная сеть."},
  {title:"Три сети мозга",sub:"Как взаимодействуют",icon:"◎",color:"#a78bfa",
   body:"DMN -- внутренний рассказчик, активна в покое и при сериалах. CEN -- директор, активна при усилии. SN -- модератор между ними, решает кому слово. В медитации тренируется связка SN↔CEN."},
  {title:"Медитация: механизм",sub:"4 фазы",icon:"◉",color:"#4ade80",
   body:"(1) фокус -- CEN активна; (2) пришла мысль -- DMN захватывает; (3) заметили мысль -- SN сработала; (4) вернули внимание -- CEN снова. Шаг 3→4 и есть повторение. Реакция: заметить → назвать → вернуться."},
  {title:"Планирование тренирует CEN",sub:"Даже сериал и пицца",icon:"▣",color:"#fbbf24",
   body:"CEN тренирует структура, не содержание. Запланировал сериал -- CEN активна. Остановился по плану -- подавление импульса = тренировка dlPFC. Сериал по плану лучше, чем бесплановая полезная активность."},
  {title:"Мысли в медитации",sub:"Откуда и как реагировать",icon:"✦",color:"#f87171",
   body:"Мысли -- это DMN. Момент когда заметили -- это SN. Бороться нельзя: усиливает мысль. Правильно: заметить → назвать тип (планирование, воспоминание) → не оценивать → вернуться к дыханию."},
  {title:"Микро-задачи и CEN",sub:"1 минута уборки",icon:"◉",color:"#a78bfa",
   body:"CEN тренирует завершённые циклы: решил → сделал → завершил. 1 минута уборки = 1 цикл. Для истощённой CEN много маленьких циклов эффективнее одного большого. Не заменяют длинные блоки -- там другая адаптация."},
  {title:"Почему соцсети разрушают CEN",sub:"Механизм истощения",icon:"⚡",color:"#f87171",
   body:"Соцсети требуют поверхностного переключения. CEN активируется без нагрузки -- как стоять с гантелями не поднимая. Каждое переключение -- микро-выброс дофамина, снижающий порог стимуляции."}
];
var EQ=[
  {id:"focus",label:"Легко ли удерживать фокус?",inv:false},
  {id:"phone",label:"Тянулся к телефону бессознательно?",inv:true},
  {id:"clarity",label:"Ясность мышления сейчас?",inv:false}
];

var state={tab:“checklist”,checked:{},history:[],checkin:null,openTask:null,openCard:null,timers:{},scores:{}};

function today(){return new Date().toISOString().split(“T”)[0];}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function init(){
var ch=load(“cen:checked:”+today());
var hi=load(“cen:history”);
var ci=load(“cen:checkin:”+today());
if(ch)state.checked=ch;
if(hi)state.history=hi;
if(ci)state.checkin=ci;
TASKS.forEach(function(t){
if(t.dur>0) state.timers[t.id]={sec:t.dur*60,on:false,done:false};
});
setInterval(tick,1000);
render();
}

function tick(){
var changed=false;
TASKS.forEach(function(t){
if(t.dur>0&&state.timers[t.id].on){
if(state.timers[t.id].sec>0){state.timers[t.id].sec–;changed=true;}
else{state.timers[t.id].on=false;state.timers[t.id].done=true;changed=true;}
}
});
if(changed)render();
}

function fmt(sec){
return (“0”+Math.floor(sec/60)).slice(-2)+”:”+(“0”+(sec%60)).slice(-2);
}

function el(tag,attr,html){
var e=document.createElement(tag);
if(attr)Object.keys(attr).forEach(function(k){
if(k===“style”)Object.assign(e.style,attr[k]);
else if(k===“onclick”)e.onclick=attr[k];
else e.setAttribute(k,attr[k]);
});
if(html!==undefined)e.innerHTML=html;
return e;
}

function renderHeader(){
var days=state.history.length;
var phase=days<14?{n:1,label:“Стабилизация”,color:”#f87171”}:days<42?{n:2,label:“Строим”,color:”#fbbf24”}:{n:3,label:“Закрепление”,color:”#4ade80”};
var done=Object.values(state.checked).filter(Boolean).length;
var h=new Date().getHours();
var hi=h<12?“Доброе утро”:h<18?“Добрый день”:“Добрый вечер”;
var pct=Math.round(done/TASKS.length*100);
var tabs=[{id:“checklist”,label:“День”,icon:“▣”},{id:“evening”,label:“Вечер”,icon:“◐”}];
var html=’<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">’;
html+=’<div><div style="font-size:10px;color:#6b6a85;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">CEN Trainer</div>’;
html+=’<div style="font-size:20px;font-weight:700;color:#e8e6ff">’+hi+’</div></div>’;
html+=’<div style="background:'+phase.color+'22;border:1px solid '+phase.color+'44;border-radius:10px;padding:6px 10px;text-align:center">’;
html+=’<div style="font-size:9px;color:'+phase.color+';font-weight:700;text-transform:uppercase">Фаза ‘+phase.n+’</div>’;
html+=’<div style="font-size:11px;color:#e8e6ff;font-weight:600">’+phase.label+’</div>’;
html+=’<div style="font-size:9px;color:#6b6a85">’+days+’ дн.</div></div></div>’;
html+=’<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px">’;
html+=’<span style="font-size:11px;color:#6b6a85">Прогресс дня</span>’;
html+=’<span style="font-size:11px;color:#7c6aff;font-weight:600">’+done+’/’+TASKS.length+’</span></div>’;
html+=’<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>’;
html+=’<div class="tabs">’;
tabs.forEach(function(t){
html+=’<button class="tab'+(state.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">’;
html+=’<div class="tab-icon">’+t.icon+’</div>’+t.label+’</button>’;
});
html+=’</div>’;
document.getElementById(“header”).innerHTML=html;
}

function setTab(t){state.tab=t;render();}

function toggleTask(id){
state.checked[id]=!state.checked[id];
save(“cen:checked:”+today(),state.checked);
render();
}

function openTask(id){
state.openTask=state.openTask===id?null:id;
render();
}

function toggleTimer(id){
var tm=state.timers[id];
if(tm.done){tm.sec=TASKS.find(function(t){return t.id===id;}).dur*60;tm.on=false;tm.done=false;}
else{tm.on=!tm.on;}
render();
}

function renderMorning(){
var days=state.history.length;
var html=’<div class="card" style="border-color:#3d3580;background:rgba(124,106,255,0.08)">’;
html+=’<div style="font-size:10px;color:#7c6aff;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Нейронаука дня</div>’;
html+=’<div style="font-size:13px;color:#e8e6ff;line-height:1.75">CEN тренирует <strong style="color:#7c6aff">структура</strong>, не содержание. Запланировал сериал и остановился – лучше для dlPFC, чем бесплановая «полезная» активность.</div></div>’;
html+=’<div class="card"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Три сети мозга</div>’;
var nets=[{n:“DMN”,d:“Внутренний рассказчик”,c:”#a78bfa”,note:“Сериалы, мечты, мысли в медитации”},{n:“SN”,d:“Модератор”,c:”#fbbf24”,note:“Замечает важное, решает кому слово”},{n:“CEN”,d:“Директор”,c:”#7c6aff”,note:“Работа, планирование, медитация”}];
nets.forEach(function(n){
html+=’<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">’;
html+=’<div style="width:36px;height:36px;border-radius:8px;background:'+n.c+'22;border:1px solid '+n.c+'44;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:'+n.c+';flex-shrink:0">’+n.n+’</div>’;
html+=’<div><div style="font-size:12px;font-weight:600;color:#e8e6ff">’+n.d+’</div><div style="font-size:11px;color:#6b6a85">’+n.note+’</div></div></div>’;
});
html+=’</div>’;
html+=’<div style="font-size:11px;color:#6b6a85;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">План дня</div>’;
TASKS.forEach(function(t){
var ch=!!state.checked[t.id];
html+=’<div style=“display:flex;align-items:center;gap:12px;background:’+(ch?“rgba(74,222,128,0.04)”:”#13131a”)+’;border:1px solid ‘+(ch?“rgba(74,222,128,0.2)”:”#2a2a3a”)+’;border-radius:12px;padding:11px 14px;margin-bottom:8px”>’;
html+=’<span style=“font-size:16px;color:’+(ch?”#4ade80”:t.color)+’”>’+t.icon+’</span>’;
html+=’<div style="flex:1"><div style=“font-size:13px;font-weight:600;color:’+(ch?”#6b6a85”:”#e8e6ff”)+’;text-decoration:’+(ch?“line-through”:“none”)+’”>’+t.label+’</div>’;
html+=’<div style="font-size:10px;color:#6b6a85">’+(t.dur>0?t.dur+” мин”:“По расписанию”)+’</div></div>’;
html+=’<div style="font-size:9px;color:'+t.color+';background:'+t.color+'22;border-radius:6px;padding:3px 7px;font-weight:600">’+t.tag+’</div></div>’;
});
html+=’<div class="card" style="margin-top:4px"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Дорожная карта</div>’;
[{p:“1–2 нед”,d:“Убираем разрушителей. Раздражение нормально.”,c:”#f87171”,a:days<14},{p:“3–6 нед”,d:“Прямая тренировка dlPFC.”,c:”#fbbf24”,a:days>=14&&days<42},{p:“7–12 нед”,d:“CEN как базовое состояние.”,c:”#4ade80”,a:days>=42}].forEach(function(item){
html+=’<div style=“display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;opacity:’+(item.a?“1”:“0.4”)+’”>’;
html+=’<div style="font-size:9px;font-weight:700;color:'+item.c+';background:'+item.c+'22;border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0">’+item.p+’</div>’;
html+=’<div style=“font-size:12px;color:’+(item.a?”#e8e6ff”:”#6b6a85”)+’;line-height:1.6”>’+(item.a?“← сейчас · “:””)+item.d+’</div></div>’;
});
html+=’</div>’;
return html;
}

function renderChecklist(){
var html=’<div style="font-size:12px;color:#6b6a85;margin-bottom:14px;line-height:1.6">Нажмите на задачу – объяснение и таймер. Галочка – выполнено.</div>’;
TASKS.forEach(function(t){
var ch=!!state.checked[t.id];
var open=state.openTask===t.id;
html+=’<div style=“background:’+(ch?“rgba(74,222,128,0.04)”:”#13131a”)+’;border:1px solid ‘+(ch?“rgba(74,222,128,0.25)”:”#2a2a3a”)+’;border-radius:16px;margin-bottom:10px;overflow:hidden”>’;
html+=’<div class="task-row" style="background:transparent;border:none;margin:0;border-radius:0" onclick="openTask(\''+t.id+'\')">’;
html+=’<div style=“width:36px;height:36px;border-radius:10px;background:’+(ch?”#052e16”:t.color+“22”)+’;border:1px solid ‘+(ch?“rgba(74,222,128,0.3)”:t.color+“44”)+’;display:flex;align-items:center;justify-content:center;font-size:16px;color:’+(ch?”#4ade80”:t.color)+’;flex-shrink:0”>’+t.icon+’</div>’;
html+=’<div style="flex:1"><div style=“font-size:14px;font-weight:600;color:’+(ch?”#6b6a85”:”#e8e6ff”)+’;text-decoration:’+(ch?“line-through”:“none”)+’”>’+t.label+’</div>’;
html+=’<div style="font-size:11px;color:'+t.color+';margin-top:2px">’+t.tag+’</div></div>’;
html+=’<div style="display:flex;align-items:center;gap:10px">’;
if(t.dur>0)html+=’<span style="font-size:11px;color:#6b6a85">’+t.dur+‘м</span>’;
html+=’<div onclick=“event.stopPropagation();toggleTask('’+t.id+’')” style=“width:22px;height:22px;border-radius:6px;border:2px solid ‘+(ch?”#4ade80”:”#2a2a3a”)+’;background:’+(ch?”#4ade80”:“transparent”)+’;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;font-size:12px;font-weight:800”>’+(ch?“✓”:””)+’</div>’;
html+=’</div></div>’;
if(open){
html+=’<div style="border-top:1px solid #2a2a3a;padding:14px 16px">’;
html+=’<div style=“font-size:12px;color:#6b6a85;line-height:1.75;background:rgba(124,106,255,0.1);border-radius:10px;padding:10px 12px;border-left:3px solid ‘+t.color+’;margin-bottom:’+(t.dur>0?“14px”:“0”)+’”>’+t.why+’</div>’;
if(t.dur>0){
var tm=state.timers[t.id];
var prog=1-tm.sec/(t.dur*60);
var r=36,circ=2*Math.PI*r;
var offset=circ*(1-prog);
var strokeColor=tm.done?”#4ade80”:t.color;
html+=’<div style="display:flex;flex-direction:column;align-items:center;gap:8px">’;
html+=’<div style="position:relative;width:88px;height:88px">’;
html+=’<svg width="88" height="88" style="transform:rotate(-90deg);position:absolute">’;
html+=’<circle cx="44" cy="44" r="36" fill="none" stroke="#2a2a3a" stroke-width="4"/>’;
html+=’<circle cx="44" cy="44" r="36" fill="none" stroke="'+strokeColor+'" stroke-width="4" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>’;
html+=’</svg>’;
html+=’<div style=“position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:’+(tm.done?”#4ade80”:”#e8e6ff”)+’;font-family:monospace”>’+(tm.done?“✓”:fmt(tm.sec))+’</div></div>’;
html+=’<button onclick=“toggleTimer('’+t.id+’')” style=“padding:6px 18px;border-radius:8px;font-size:12px;font-weight:600;background:’+(tm.done?”#052e16”:tm.on?”#1c1c28”:“rgba(124,106,255,0.15)”)+’;border:1px solid ‘+(tm.done?”#4ade80”:tm.on?”#2a2a3a”:”#7c6aff”)+’;color:’+(tm.done?”#4ade80”:tm.on?”#6b6a85”:”#7c6aff”)+’”>’+(tm.done?“Сброс”:tm.on?“Пауза”:“Старт”)+’</button>’;
html+=’</div>’;
}
html+=’</div>’;
}
html+=’</div>’;
});
html+=’<div style="margin-top:4px;background:#fbbf2410;border:1px solid #fbbf2430;border-radius:14px;padding:14px">’;
html+=’<div style="font-size:10px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Принцип планирования</div>’;
html+=’<div style="font-size:12px;color:#6b6a85;line-height:1.7">CEN тренирует структура, не содержание. Запланировал сериал → остановился вовремя = полный цикл CEN.</div></div>’;
return html;
}

function openCard(i){state.openCard=state.openCard===i?null:i;render();}

function renderLearn(){
var html=’<div style="font-size:12px;color:#6b6a85;margin-bottom:14px;line-height:1.6">Понимание механизма – это мотивация. Нажмите для раскрытия.</div>’;
CARDS.forEach(function(c,i){
var open=state.openCard===i;
html+=’<div onclick=“openCard(’+i+’)” style=“background:#13131a;border:1px solid ‘+(open?c.color+“44”:”#2a2a3a”)+’;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer”>’;
html+=’<div style=“display:flex;align-items:center;gap:10px;margin-bottom:’+(open?“10px”:“0”)+’”>’;
html+=’<div style="width:32px;height:32px;border-radius:8px;background:'+c.color+'22;border:1px solid '+c.color+'44;display:flex;align-items:center;justify-content:center;font-size:14px;color:'+c.color+';flex-shrink:0">’+c.icon+’</div>’;
html+=’<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#e8e6ff">’+c.title+’</div><div style="font-size:11px;color:#6b6a85">’+c.sub+’</div></div>’;
html+=’<span style="color:#3d3c55;font-size:10px">’+(open?“▲”:“▼”)+’</span></div>’;
if(open)html+=’<div style="font-size:12px;color:#6b6a85;line-height:1.75">’+c.body+’</div>’;
html+=’</div>’;
});
return html;
}

function setScore(id,n){state.scores[id]=n;render();}

function saveDay(){
var entry={date:today(),focus:state.scores.focus,phone:state.scores.phone,clarity:state.scores.clarity};
state.history=state.history.filter(function(h){return h.date!==today();});
state.history.push(entry);
state.checkin=state.scores;
save(“cen:history”,state.history);
save(“cen:checkin:”+today(),state.scores);
render();
}

function resetCheckin(){state.checkin=null;render();}

function renderChart(){
if(!state.history.length)return ‘<div style="text-align:center;color:#6b6a85;font-size:12px;padding:20px 0">Данные появятся после первого чекина</div>’;
var last7=state.history.slice(-7);
function score(d){return Math.round((d.focus+(6-d.phone)+d.clarity)/3);}
var avg=(last7.reduce(function(a,d){return a+score(d);},0)/last7.length).toFixed(1);
var trend=last7.length>=2?score(last7[last7.length-1])-score(last7[0]):0;
var days=[“Вс”,“Пн”,“Вт”,“Ср”,“Чт”,“Пт”,“Сб”];
var html=’<div style="display:flex;align-items:flex-end;gap:6px;height:72px;margin-bottom:6px">’;
last7.forEach(function(d){
var s=score(d);
var h=Math.max(6,s/5*60);
html+=’<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">’;
html+=’<span style="font-size:9px;color:#7c6aff;font-weight:700">’+s+’</span>’;
html+=’<div class="chart-bar" style="width:100%;height:'+h+'px"></div></div>’;
});
html+=’</div><div style="display:flex;gap:6px;margin-bottom:12px">’;
last7.forEach(function(d){html+=’<div style="flex:1;text-align:center;font-size:9px;color:#6b6a85">’+days[new Date(d.date).getDay()]+’</div>’;});
html+=’</div><div style="display:flex;gap:8px">’;
html+=’<div style="flex:1;background:rgba(124,106,255,0.15);border:1px solid #3d3580;border-radius:10px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:#7c6aff">’+avg+’</div><div style="font-size:10px;color:#6b6a85">средний CEN</div></div>’;
html+=’<div style=“flex:1;background:’+(trend>=0?“rgba(74,222,128,0.08)”:“rgba(248,113,113,0.08)”)+’;border:1px solid ‘+(trend>=0?“rgba(74,222,128,0.2)”:“rgba(248,113,113,0.2)”)+’;border-radius:10px;padding:8px;text-align:center”><div style=“font-size:20px;font-weight:700;color:’+(trend>=0?”#4ade80”:”#f87171”)+’”>’+(trend>0?”+”:””)+trend+’</div><div style="font-size:10px;color:#6b6a85">динамика</div></div>’;
html+=’</div>’;
return html;
}

function renderEvening(){
if(state.checkin){
var html=’<div style="text-align:center;padding:24px 0 20px">’;
html+=’<div style="font-size:36px;margin-bottom:10px">◎</div>’;
html+=’<div style="font-size:18px;font-weight:700;color:#e8e6ff;margin-bottom:6px">День сохранён</div>’;
html+=’<div style="font-size:13px;color:#6b6a85">CEN получила нагрузку. Хороший сон закрепит.</div></div>’;
html+=’<div style="display:flex;gap:8px;margin-bottom:16px">’;
EQ.forEach(function(q){
var v=state.checkin[q.id];
var disp=q.inv?6-v:v;
html+=’<div style="flex:1;background:#13131a;border:1px solid #2a2a3a;border-radius:12px;padding:10px 8px;text-align:center">’;
html+=’<div style="font-size:22px;font-weight:700;color:#7c6aff">’+disp+’</div>’;
html+=’<div style="font-size:9px;color:#6b6a85">’+(q.id===“focus”?“фокус”:q.id===“phone”?“без тел.”:“ясность”)+’</div></div>’;
});
html+=’</div>’;
html+=’<div class="card"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">График CEN · ‘+state.history.length+’ дн.</div>’;
html+=renderChart()+’</div>’;
html+=’<button onclick="resetCheckin()" style="width:100%;background:transparent;border:1px solid #2a2a3a;color:#6b6a85;border-radius:10px;padding:9px;font-size:12px;cursor:pointer;margin-top:8px">Изменить ответы</button>’;
return html;
}
var html=’<div style="background:rgba(124,106,255,0.1);border:1px solid #3d3580;border-radius:16px;padding:14px;margin-bottom:16px;font-size:13px;color:#e8e6ff;line-height:1.7">Вечерний чекин – не самооценка. Данные для понимания корреляций с практиками.</div>’;
EQ.forEach(function(q){
html+=’<div style="margin-bottom:18px"><div style="font-size:13px;color:#e8e6ff;margin-bottom:8px">’+q.label+’</div><div style="display:flex;gap:8px">’;
[1,2,3,4,5].forEach(function(n){
var sel=state.scores[q.id]===n;
html+=’<button onclick=“setScore('’+q.id+’',’+n+’)” class=“score-btn’+(sel?” selected”:””)+’”>’+n+’</button>’;
});
html+=’</div></div>’;
});
var ready=EQ.every(function(q){return state.scores[q.id]!==undefined;});
if(ready)html+=’<button class="save-btn" onclick="saveDay()">Сохранить день</button>’;
if(state.history.length>0){
html+=’<div class="card" style="margin-top:20px"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">История · ‘+state.history.length+’ дн.</div>’;
html+=renderChart()+’</div>’;
}
return html;
}

function render(){
renderHeader();
var html=””;
if(state.tab===“checklist”)html=renderChecklist();
else html=renderEvening();
document.getElementById(“content”).innerHTML=html;
}

init();
</script>

</body>
</html>
