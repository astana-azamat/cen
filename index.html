<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e8e6ff;font-family:system-ui,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 0;background:#0a0a0f;position:sticky;top:0;z-index:10}
.content{flex:1;padding:0 20px 80px;overflow-y:auto}
.tabs{display:flex;gap:4px;background:#13131a;border-radius:14px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border-radius:10px;background:transparent;color:#6b6a85;font-size:10px;font-weight:600;border-bottom:2px solid transparent;text-align:center}
.tab.active{background:rgba(124,106,255,0.15);color:#7c6aff;border-bottom:2px solid #7c6aff}
.tab-icon{font-size:14px;margin-bottom:2px}
.card{background:#13131a;border:1px solid #2a2a3a;border-radius:16px;padding:16px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px}
.badge{font-size:9px;font-weight:700;border-radius:6px;padding:3px 7px}
.progress-bar{height:4px;background:#2a2a3a;border-radius:4px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(to right,#7c6aff,#a78bfa);transition:width 0.5s}
.task-row{display:flex;align-items:center;gap:12px;background:#13131a;border:1px solid #2a2a3a;border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.task-row.done{background:rgba(74,222,128,0.04);border-color:rgba(74,222,128,0.25)}
.task-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.task-detail{border-top:1px solid #2a2a3a;padding:14px 16px}
.why-box{font-size:12px;color:#6b6a85;line-height:1.75;background:rgba(124,106,255,0.15);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #2a2a3a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:#000;font-size:12px;font-weight:800}
.checkbox.checked{background:#4ade80;border-color:#4ade80}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.timer-btn{padding:6px 18px;border-radius:8px;font-size:12px;font-weight:600}
.learn-card{background:#13131a;border:1px solid #2a2a3a;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.learn-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.score-btn{width:44px;height:44px;border-radius:10px;border:1px solid #2a2a3a;background:#13131a;color:#6b6a85;font-size:14px;font-weight:700;cursor:pointer}
.score-btn.selected{background:rgba(124,106,255,0.15);border-color:#7c6aff;color:#7c6aff}
.save-btn{width:100%;padding:13px;border-radius:12px;background:rgba(124,106,255,0.15);border:1px solid #7c6aff;color:#7c6aff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.chart-bar{border-radius:5px;background:linear-gradient(to top,#7c6aff,#3d3580);transition:height 0.6s}
</style>
</head>

  {id:"bath",label:"Горячая ванна",dur:0,icon:"◑",tag:"Вечерний ритуал",color:"#38bdf8",

  {id:"sleep",label:"Фиксированный отбой",dur:0,icon:"◐",tag:"Базовое условие",color:"#fbbf24",

var DEFAULT_DEBUFFS=[
  {id:"social",label:"Instagram, YouTube",icon:"📱",tag:"Соц. сети"},
  {id:"warcraft",label:"Warcraft",icon:"🎮",tag:"Игры"},
  {id:"porn",label:"Просмотр порно",icon:"◐",tag:"Дофамин"},
  {id:"junkfood",label:"Вредная еда",icon:"🍔",tag:"Дофамин"}
];

var state={tab:"summary",checked:{},history:[],checkin:null,openTask:null,timers:{},scores:{},variant:null};

function today(){return new Date().toISOString().split("T")[0];}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function init(){
var ch=load("cen:checked:"+today());
var hi=load("cen:history");
var ci=load("cen:checkin:"+today());
var va=load("cen:variant:"+today());
if(ch)state.checked=ch;
if(hi)state.history=hi;
if(ci)state.checkin=ci;
if(va)state.variant=va;
TASKS.forEach(function(t){
if(t.dur>0) state.timers[t.id]={sec:t.dur*60,on:false,done:false};
});
setInterval(tick,1000);
render();
}

function setVariant(id){state.variant=id;save("cen:variant:"+today(),id);render();}
function clearVariant(){state.variant=null;localStorage.removeItem("cen:variant:"+today());render();}

function getDebuffs(){return load("cen:debuffs")||DEFAULT_DEBUFFS;}
function getDebuffLog(date){return load("cen:debuff_log:"+(date||today()))||{};}
function setDebuffMinutes(id,n){
var log=getDebuffLog();
log[id]=Math.max(0,n|0);
save("cen:debuff_log:"+today(),log);
render();
}
function addDebuffMinutes(id,delta){
var log=getDebuffLog();
setDebuffMinutes(id,(log[id]||0)+delta);
}
function editDebuffMinutes(id){
var log=getDebuffLog();
var current=log[id]||0;
var input=prompt("Минуты сегодня:",String(current));
if(input===null)return;
var n=parseInt(input,10);
if(isNaN(n))return;
setDebuffMinutes(id,n);
}
function getDebuffTotal(date){
var log=getDebuffLog(date);
var total=0;
Object.keys(log).forEach(function(k){total+=log[k]||0;});
return total;
}

function getVariantOrder(v){
var saved=load("cen:order:"+v.id);
var ids=v.plan.map(function(p){return p.id;});
if(!saved||!saved.length)return ids;
var result=[];
saved.forEach(function(id){if(ids.indexOf(id)!==-1)result.push(id);});
ids.forEach(function(id){if(result.indexOf(id)===-1)result.push(id);});
return result;
}

function moveTask(variantId,taskId,direction){
var v=null;
for(var i=0;i<VARIANTS.length;i++)if(VARIANTS[i].id===variantId){v=VARIANTS[i];break;}
if(!v)return;
var order=getVariantOrder(v);
var idx=order.indexOf(taskId);
if(idx===-1)return;
var newIdx=idx+direction;
if(newIdx<0||newIdx>=order.length)return;
var tmp=order[idx];order[idx]=order[newIdx];order[newIdx]=tmp;
save("cen:order:"+variantId,order);
render();
}

function computeTimes(v,orderedIds){
var planMap={};
v.plan.forEach(function(p){planMap[p.id]=p;});
var parts=v.startTime.split(":");
var total=parseInt(parts[0],10)*60+parseInt(parts[1],10);
var result=[];
orderedIds.forEach(function(id){
var p=planMap[id];if(!p)return;
var hh=Math.floor(total/60),mm=total%60;
var timeStr=hh+":"+(mm<10?"0":"")+mm;
result.push({id:p.id,dur:p.dur,time:timeStr});
total+=p.dur;
});
return result;
}

function tick(){
var changed=false;
TASKS.forEach(function(t){
if(t.dur>0&&state.timers[t.id].on){
if(state.timers[t.id].sec>0){state.timers[t.id].sec--;changed=true;}
else{state.timers[t.id].on=false;state.timers[t.id].done=true;changed=true;}
}
});
if(changed)render();
}

function fmt(sec){
return ("0"+Math.floor(sec/60)).slice(-2)+":"+("0"+(sec%60)).slice(-2);
}

function el(tag,attr,html){
var e=document.createElement(tag);
if(attr)Object.keys(attr).forEach(function(k){
if(k==="style")Object.assign(e.style,attr[k]);
else if(k==="onclick")e.onclick=attr[k];
else e.setAttribute(k,attr[k]);
});
if(html!==undefined)e.innerHTML=html;
return e;
}

function getActiveDays(){
var dates={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(!k)continue;
if(k.indexOf("cen:checked:")===0){
try{var d=JSON.parse(localStorage.getItem(k));
if(d&&Object.values(d).some(function(v){return v;}))dates[k.substring(12)]=true;
}catch(e){}
}
if(k.indexOf("cen:checkin:")===0)dates[k.substring(12)]=true;
}
return Object.keys(dates).length;
}

function renderHeader(){
var days=Math.max(getActiveDays(),state.history.length);
var phase=days<14?{n:1,label:"Стабилизация",color:"#f87171"}:days<42?{n:2,label:"Строим",color:"#fbbf24"}:{n:3,label:"Закрепление",color:"#4ade80"};
var done=Object.values(state.checked).filter(Boolean).length;
var h=new Date().getHours();
var hi=h<12?"Доброе утро":h<18?"Добрый день":"Добрый вечер";
var pct=Math.round(done/TASKS.length*100);
var tabs=[{id:"morning",label:"Утро",icon:"◎"},{id:"day",label:"День",icon:"▣"},{id:"evening",label:"Вечер",icon:"◐"},{id:"summary",label:"Сводка",icon:"◈"}];
var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
html+='<div><div style="font-size:10px;color:#6b6a85;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">CEN Trainer</div>';
html+='<div style="font-size:20px;font-weight:700;color:#e8e6ff">'+hi+'</div></div>';
html+='<div style="background:'+phase.color+'22;border:1px solid '+phase.color+'44;border-radius:10px;padding:6px 10px;text-align:center">';
html+='<div style="font-size:9px;color:'+phase.color+';font-weight:700;text-transform:uppercase">Фаза '+phase.n+'</div>';
html+='<div style="font-size:11px;color:#e8e6ff;font-weight:600">'+phase.label+'</div>';
html+='<div style="font-size:9px;color:#6b6a85">'+days+' дн.</div></div></div>';
html+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px">';
html+='<span style="font-size:11px;color:#6b6a85">Прогресс дня</span>';
html+='<span style="font-size:11px;color:#7c6aff;font-weight:600">'+done+'/'+TASKS.length+'</span></div>';
html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
html+='<div class="tabs">';
tabs.forEach(function(t){
html+='<button class="tab'+(state.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">';
html+='<div class="tab-icon">'+t.icon+'</div>'+t.label+'</button>';
});
html+='</div>';
document.getElementById("header").innerHTML=html;
}

function setTab(t){state.tab=t;render();}

function toggleTask(id){
state.checked[id]=!state.checked[id];
save("cen:checked:"+today(),state.checked);
render();
}

function openTask(id){
state.openTask=state.openTask===id?null:id;
render();
}

function toggleTimer(id){
var tm=state.timers[id];
if(tm.done){tm.sec=TASKS.find(function(t){return t.id===id;}).dur*60;tm.on=false;tm.done=false;}
else{tm.on=!tm.on;}
render();
}

function findTask(id){for(var i=0;i<TASKS.length;i++)if(TASKS[i].id===id)return TASKS[i];return null;}

function taskCard(t,opt){
opt=opt||{};
var displayDur=opt.dur!==undefined?opt.dur:t.dur;
var refDur=t.dur;
var ch=!!state.checked[t.id];
var open=state.openTask===t.id;
var html='<div style="background:'+(ch?"rgba(74,222,128,0.04)":"#13131a")+';border:1px solid '+(ch?"rgba(74,222,128,0.25)":"#2a2a3a")+';border-radius:16px;margin-bottom:10px;overflow:hidden">';
html+='<div class="task-row" style="background:transparent;border:none;margin:0;border-radius:0" onclick="openTask(\''+t.id+'\')">';
if(opt.time)html+='<div style="font-size:11px;color:#6b6a85;font-weight:600;width:42px;flex-shrink:0">'+opt.time+'</div>';
html+='<div style="width:36px;height:36px;border-radius:10px;background:'+(ch?"#052e16":t.color+"22")+';border:1px solid '+(ch?"rgba(74,222,128,0.3)":t.color+"44")+';display:flex;align-items:center;justify-content:center;font-size:16px;color:'+(ch?"#4ade80":t.color)+';flex-shrink:0">'+t.icon+'</div>';
html+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:'+(ch?"#6b6a85":"#e8e6ff")+';text-decoration:'+(ch?"line-through":"none")+'">'+t.label+'</div>';
html+='<div style="font-size:11px;color:'+t.color+';margin-top:2px">'+t.tag+'</div></div>';
html+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
if(opt.arrows&&opt.variantId){
html+='<div style="display:flex;flex-direction:column;gap:2px">';
html+='<button onclick="event.stopPropagation();moveTask(\''+opt.variantId+'\',\''+t.id+'\',-1)" '+(opt.first?'disabled ':'')+'style="width:22px;height:18px;border-radius:4px;background:#0a0a0f;border:1px solid #2a2a3a;color:'+(opt.first?'#3d3c55':'#a78bfa')+';font-size:9px;cursor:'+(opt.first?'not-allowed':'pointer')+';padding:0;line-height:1">▲</button>';
html+='<button onclick="event.stopPropagation();moveTask(\''+opt.variantId+'\',\''+t.id+'\',1)" '+(opt.last?'disabled ':'')+'style="width:22px;height:18px;border-radius:4px;background:#0a0a0f;border:1px solid #2a2a3a;color:'+(opt.last?'#3d3c55':'#a78bfa')+';font-size:9px;cursor:'+(opt.last?'not-allowed':'pointer')+';padding:0;line-height:1">▼</button>';
html+='</div>';
}
if(displayDur>0){
var durLabel=displayDur+'м';
if(opt.dur!==undefined&&opt.dur!==refDur)durLabel+='<span style="color:#3d3c55"> · '+refDur+'м</span>';
html+='<span style="font-size:11px;color:#6b6a85">'+durLabel+'</span>';
}
html+='<div onclick="event.stopPropagation();toggleTask(\''+t.id+'\')" style="width:22px;height:22px;border-radius:6px;border:2px solid '+(ch?"#4ade80":"#2a2a3a")+';background:'+(ch?"#4ade80":"transparent")+';display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;font-size:12px;font-weight:800">'+(ch?"✓":"")+'</div>';
html+='</div></div>';
if(open){
html+='<div style="border-top:1px solid #2a2a3a;padding:14px 16px">';
html+='<div style="font-size:12px;color:#6b6a85;line-height:1.75;background:rgba(124,106,255,0.1);border-radius:10px;padding:10px 12px;border-left:3px solid '+t.color+';margin-bottom:'+(t.dur>0?"14px":"0")+'">'+t.why+'</div>';
if(t.dur>0){
var tm=state.timers[t.id];
var prog=1-tm.sec/(t.dur*60);
var r=36,circ=2*Math.PI*r;
var offset=circ*(1-prog);
var strokeColor=tm.done?"#4ade80":t.color;
html+='<div style="display:flex;flex-direction:column;align-items:center;gap:8px">';
html+='<div style="position:relative;width:88px;height:88px">';
html+='<svg width="88" height="88" style="transform:rotate(-90deg);position:absolute">';
html+='<circle cx="44" cy="44" r="36" fill="none" stroke="#2a2a3a" stroke-width="4"/>';
html+='<circle cx="44" cy="44" r="36" fill="none" stroke="'+strokeColor+'" stroke-width="4" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>';
html+='</svg>';
html+='<div style="position:absolute;inset:0;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+(tm.done?"#4ade80":"#e8e6ff")+';font-family:monospace">'+(tm.done?"✓":fmt(tm.sec))+'</div></div>';
html+='<button onclick="toggleTimer(\''+t.id+'\')" style="padding:6px 18px;border-radius:8px;font-size:12px;font-weight:600;background:'+(tm.done?"#052e16":tm.on?"#1c1c28":"rgba(124,106,255,0.15)")+';border:1px solid '+(tm.done?"#4ade80":tm.on?"#2a2a3a":"#7c6aff")+';color:'+(tm.done?"#4ade80":tm.on?"#6b6a85":"#7c6aff")+'">'+(tm.done?"Сброс":tm.on?"Пауза":"Старт")+'</button>';
html+='</div>';
}
html+='</div>';
}
html+='</div>';
return html;
}

function renderMorning(){
if(!state.variant){
var html='<div style="font-size:13px;color:#e8e6ff;margin-bottom:14px;line-height:1.6">Во сколько встал? Выбери — загружу план утра.</div>';
VARIANTS.forEach(function(v){
html+='<div onclick="setVariant(\''+v.id+'\')" style="display:flex;align-items:center;gap:14px;background:#13131a;border:1px solid #2a2a3a;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer">';
html+='<div style="width:40px;height:40px;border-radius:10px;background:'+v.color+'22;border:1px solid '+v.color+'44;display:flex;align-items:center;justify-content:center;font-size:18px;color:'+v.color+';flex-shrink:0">'+v.icon+'</div>';
html+='<div style="flex:1"><div style="font-size:14px;font-weight:600;color:#e8e6ff">'+v.label+'</div>';
html+='<div style="font-size:11px;color:#6b6a85;margin-top:2px">'+v.plan.length+' задач</div></div>';
html+='<span style="color:#3d3c55;font-size:14px">›</span></div>';
});
html+=renderDebuffs();
return html;
}
var v=null;
for(var i=0;i<VARIANTS.length;i++)if(VARIANTS[i].id===state.variant){v=VARIANTS[i];break;}
if(!v){state.variant=null;return renderMorning();}
var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
html+='<div><div style="font-size:11px;color:#6b6a85;text-transform:uppercase;letter-spacing:1px">План утра</div>';
html+='<div style="font-size:16px;font-weight:700;color:#e8e6ff">'+v.label+'</div></div>';
html+='<button onclick="clearVariant()" style="background:transparent;border:1px solid #2a2a3a;color:#6b6a85;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer">Сменить</button></div>';
html+='<div style="font-size:11px;color:#6b6a85;margin-bottom:10px;line-height:1.5">Стрелки — переставить порядок (сохраняется навсегда). Времена пересчитаются.</div>';
var ordered=getVariantOrder(v);
var withTimes=computeTimes(v,ordered);
withTimes.forEach(function(p,i){
var t=findTask(p.id);
if(t)html+=taskCard(t,{time:p.time,dur:p.dur,arrows:true,variantId:v.id,first:i===0,last:i===withTimes.length-1});
});
html+=renderDebuffs();
return html;
}

function renderDay(){
var html='<div style="text-align:center;padding:60px 20px;color:#6b6a85;font-size:13px;line-height:1.6">';
html+='<div style="font-size:32px;margin-bottom:14px">▣</div>';
html+='<div style="font-size:15px;color:#e8e6ff;font-weight:600;margin-bottom:6px">Варианты дня</div>';
html+='<div>Скоро тут будет выбор дневного плана. Все задачи доступны во вкладке <strong style="color:#7c6aff">Сводка</strong>.</div></div>';
return html;
}

function renderEveningTasks(){
var ids=["bath","sleep"];
var html='<div style="font-size:12px;color:#6b6a85;margin-bottom:14px;line-height:1.6">Базовые вечерние ритуалы. Выбор варианта вечера будет позже.</div>';
ids.forEach(function(id){var t=findTask(id);if(t)html+=taskCard(t);});
return html;
}

function renderQuestionnaire(){
if(state.checkin){
var html='<div style="display:flex;gap:8px;margin-bottom:10px">';
EQ.forEach(function(q){
var v=state.checkin[q.id];
var disp=q.inv?6-v:v;
html+='<div style="flex:1;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;padding:10px 6px;text-align:center">';
html+='<div style="font-size:20px;font-weight:700;color:#7c6aff">'+disp+'</div>';
html+='<div style="font-size:9px;color:#6b6a85">'+(q.id==="focus"?"фокус":q.id==="phone"?"без тел.":"ясность")+'</div></div>';
});
html+='</div>';
html+='<button onclick="resetCheckin()" style="width:100%;background:transparent;border:1px solid #2a2a3a;color:#6b6a85;border-radius:10px;padding:8px;font-size:11px;cursor:pointer">Изменить ответы</button>';
return html;
}
var html='';
EQ.forEach(function(q){
html+='<div style="margin-bottom:14px"><div style="font-size:12px;color:#e8e6ff;margin-bottom:8px">'+q.label+'</div><div style="display:flex;gap:6px">';
[1,2,3,4,5].forEach(function(n){
var sel=state.scores[q.id]===n;
html+='<button onclick="setScore(\''+q.id+'\','+n+')" class="score-btn'+(sel?" selected":"")+'" style="height:38px">'+n+'</button>';
});
html+='</div></div>';
});
var ready=EQ.every(function(q){return state.scores[q.id]!==undefined;});
if(ready)html+='<button class="save-btn" onclick="saveDay()">Сохранить день</button>';
return html;
}

function renderSummary(){
var done=Object.values(state.checked).filter(Boolean).length;
var html='<div style="font-size:12px;color:#6b6a85;margin-bottom:14px;line-height:1.6">Все задачи в одном месте · '+done+' из '+TASKS.length+' выполнено.</div>';
TASKS.forEach(function(t){html+=taskCard(t);});
html+=renderDebuffs();
html+='<div class="card" style="margin-top:16px"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Вечерний опрос</div>';
html+=renderQuestionnaire();
html+='</div>';
if(state.history.length>0){
html+='<div class="card" style="margin-top:12px"><div style="font-size:11px;color:#6b6a85;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">История · '+state.history.length+' дн.</div>';
html+=renderChart()+'</div>';
}
html+=renderBackup();
return html;
}

function setScore(id,n){state.scores[id]=n;render();}

function saveDay(){
var entry={date:today(),focus:state.scores.focus,phone:state.scores.phone,clarity:state.scores.clarity};
state.history=state.history.filter(function(h){return h.date!==today();});
state.history.push(entry);
state.checkin=state.scores;
save("cen:history",state.history);
save("cen:checkin:"+today(),state.scores);
render();
}

function resetCheckin(){state.checkin=null;render();}

function renderDebuffs(){
var debuffs=getDebuffs();
var log=getDebuffLog();
var total=getDebuffTotal();
var html='<div class="card" style="margin-top:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
html+='<div style="font-size:11px;color:#6b6a85;text-transform:uppercase;letter-spacing:1px">Debuff</div>';
html+='<div style="font-size:11px;color:#6b6a85">сегодня <span style="color:'+(total>0?"#f87171":"#e8e6ff")+';font-weight:700">'+total+'м</span></div></div>';
html+='<div style="font-size:11px;color:#6b6a85;line-height:1.5;margin-bottom:12px">Что забирает ресурс CEN. Залогируй минуты — без оценок, просто факт.</div>';
debuffs.forEach(function(d){
var mins=log[d.id]||0;
html+='<div style="display:flex;align-items:center;gap:10px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:12px;padding:10px;margin-bottom:8px">';
html+='<div style="width:32px;height:32px;border-radius:8px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">'+d.icon+'</div>';
html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#e8e6ff">'+d.label+'</div>';
html+='<div style="font-size:10px;color:#6b6a85">'+d.tag+'</div></div>';
html+='<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">';
html+='<button onclick="addDebuffMinutes(\''+d.id+'\',-5)" style="width:26px;height:26px;border-radius:6px;background:#13131a;border:1px solid #2a2a3a;color:#e8e6ff;font-size:14px;cursor:pointer;padding:0">−</button>';
html+='<div onclick="editDebuffMinutes(\''+d.id+'\')" style="min-width:42px;text-align:center;font-size:13px;font-weight:600;color:'+(mins>0?"#f87171":"#6b6a85")+';cursor:pointer">'+mins+'м</div>';
html+='<button onclick="addDebuffMinutes(\''+d.id+'\',5)" style="width:26px;height:26px;border-radius:6px;background:#13131a;border:1px solid #2a2a3a;color:#e8e6ff;font-size:14px;cursor:pointer;padding:0">+</button>';
html+='</div></div>';
});
html+='</div>';
return html;
}

function renderChart(){
if(!state.history.length)return '<div style="text-align:center;color:#6b6a85;font-size:12px;padding:20px 0">Данные появятся после первого чекина</div>';
var sorted=state.history.slice().sort(function(a,b){return a.date<b.date?-1:1;});
var last=sorted.slice(-14);
function score(d){return Math.round((d.focus+(6-d.phone)+d.clarity)/3);}
var avg=(sorted.reduce(function(a,d){return a+score(d);},0)/sorted.length).toFixed(1);
var trend=last.length>=2?score(last[last.length-1])-score(last[0]):0;
var dateSet={};
sorted.forEach(function(d){dateSet[d.date]=true;});
var streak=0;
var dt=new Date();
if(!dateSet[dt.toISOString().split("T")[0]])dt.setDate(dt.getDate()-1);
for(var i=0;i<400;i++){
var key=dt.toISOString().split("T")[0];
if(dateSet[key]){streak++;dt.setDate(dt.getDate()-1);}
else break;
}
var days=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
var html='<div style="display:flex;align-items:flex-end;gap:4px;height:72px;margin-bottom:6px">';
last.forEach(function(d){
var s=score(d);
var h=Math.max(6,s/5*60);
html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">';
html+='<span style="font-size:9px;color:#7c6aff;font-weight:700">'+s+'</span>';
html+='<div class="chart-bar" style="width:100%;height:'+h+'px"></div></div>';
});
html+='</div><div style="display:flex;gap:4px;margin-bottom:12px">';
last.forEach(function(d){html+='<div style="flex:1;text-align:center;font-size:8px;color:#6b6a85">'+days[new Date(d.date).getDay()]+'</div>';});
html+='</div><div style="display:flex;gap:6px">';
html+='<div style="flex:1;background:rgba(124,106,255,0.15);border:1px solid #3d3580;border-radius:10px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:#7c6aff">'+avg+'</div><div style="font-size:10px;color:#6b6a85">средний</div></div>';
html+='<div style="flex:1;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:10px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:#fbbf24">'+streak+'</div><div style="font-size:10px;color:#6b6a85">стрик</div></div>';
html+='<div style="flex:1;background:'+(trend>=0?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)")+';border:1px solid '+(trend>=0?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)")+';border-radius:10px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:'+(trend>=0?"#4ade80":"#f87171")+'">'+(trend>0?"+":"")+trend+'</div><div style="font-size:10px;color:#6b6a85">динамика</div></div>';
html+='</div>';
var todayDebuff=getDebuffTotal();
var debuffSum=0,debuffCount=0;
last.forEach(function(d){var t=getDebuffTotal(d.date);if(t>0){debuffSum+=t;debuffCount++;}});
var avgDebuff=debuffCount?Math.round(debuffSum/debuffCount):0;
html+='<div style="margin-top:8px;padding:9px 12px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;display:flex;justify-content:space-between;align-items:center;font-size:11px">';
html+='<span style="color:#6b6a85">Debuff сегодня</span>';
html+='<span style="color:'+(todayDebuff>60?"#f87171":todayDebuff>0?"#fbbf24":"#6b6a85")+';font-weight:700">'+todayDebuff+'м<span style="color:#6b6a85;font-weight:400"> · среднее '+avgDebuff+'м</span></span>';
html+='</div>';
return html;
}

function exportData(){
var data={};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k&&k.indexOf("cen:")===0){
try{data[k]=JSON.parse(localStorage.getItem(k));}
catch(e){data[k]=localStorage.getItem(k);}
}
}
var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;a.download="cen-trainer-"+today()+".json";
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(url);},100);
}

function importData(){
var input=document.createElement("input");
input.type="file";input.accept=".json,application/json";
input.onchange=function(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
var count=0;
Object.keys(data).forEach(function(k){
if(k.indexOf("cen:")===0){localStorage.setItem(k,JSON.stringify(data[k]));count++;}
});
state.history=load("cen:history")||[];
state.checked=load("cen:checked:"+today())||{};
state.checkin=load("cen:checkin:"+today());
render();
alert("Импортировано: "+count+" записей");
}catch(err){alert("Ошибка импорта: "+err.message);}
};
reader.readAsText(file);
};
input.click();
}

function renderBackup(){
var html='<div class="card" style="margin-top:16px"><div style="font-size:11px;color:#6b6a85;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Резервная копия</div>';
html+='<div style="font-size:11px;color:#6b6a85;line-height:1.6;margin-bottom:10px">Данные хранятся только в этом браузере. Сохрани JSON, чтобы перенести на другое устройство.</div>';
html+='<div style="display:flex;gap:8px">';
html+='<button onclick="exportData()" style="flex:1;background:rgba(124,106,255,0.15);border:1px solid #7c6aff;color:#7c6aff;border-radius:10px;padding:10px;font-size:12px;font-weight:600;cursor:pointer">Скачать JSON</button>';
html+='<button onclick="importData()" style="flex:1;background:transparent;border:1px solid #2a2a3a;color:#a78bfa;border-radius:10px;padding:10px;font-size:12px;font-weight:600;cursor:pointer">Загрузить JSON</button>';
html+='</div></div>';
return html;
}

function render(){
renderHeader();
var html="";
if(state.tab==="morning")html=renderMorning();
else if(state.tab==="day")html=renderDay();
else if(state.tab==="evening")html=renderEveningTasks();
else html=renderSummary();
document.getElementById("content").innerHTML=html;
}

init();
</script>
